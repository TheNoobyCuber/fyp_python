<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Include the ONLYOFFICE API script -->
    <script type="text/javascript" src="https://documentserver/web-apps/apps/api/documents/api.js"></script>
</head>
<body>
    <div class="container mt-4">
    <div class="card shadow">
        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
            <h4 class="mb-0"><i class="bi bi-pencil-square me-2"></i>Edit File: {{ file.original_filename }}</h4>
            <a href="{{ url_for('main.view_file', file_id=file.file_id) }}" class="btn btn-light btn-sm">
                <i class="bi bi-arrow-left me-1"></i>Back
            </a>
        </div>
        <div class="card-body">
            <form method="POST" action="{{ url_for('main.edit_file', file_id=file.file_id) }}">
                {% if file.file_type == '.txt' and file_content %}
                <div class="mb-3">
                    <label for="content" class="form-label">File Content</label>
                    <textarea class="form-control" id="content" name="content" rows="20" 
                              style="font-family: monospace;">{{ file_content }}</textarea>
                </div>
                <div class="d-flex justify-content-between">
                    <a href="{{ url_for('main.view_files') }}" class="btn btn-secondary">Cancel</a>
                    <button type="submit" class="btn btn-success">
                        <i class="bi bi-save me-1"></i>Save Changes
                    </button>
                </div>
            </form>
        </div>
        <div class="card-footer text-muted">
            <small>Last modified: {{ file.upload_time.strftime('%Y-%m-%d %H:%M') }}</small>
        </div>
        {% endif %}
        {% if file.file_type in ['.doc', '.docx'] %}
        <div class="card-body">
            <form method="POST" action="{{ url_for('main.edit_file', file_id=file.file_id) }}">
        <div class="mb-3">
            <label for="content" class="form-label">File Content</label>
            <!-- 2. Create a div where the editor will appear -->
            <div id="editor">
                
            </div>
        </div>
        {% endif %}
</body>
</html>
