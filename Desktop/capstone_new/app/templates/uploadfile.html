<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload File</title>
<!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}
    <form id="uploadForm" method="POST" enctype="multipart/form-data" action="{{ url_for('main.upload') }}">
    <div class="container py-5">
        <div class="row">
            <div class="col-md-6 offset-md-3">
                <div class="card shadow-lg">
                    <div class="card-body">
                        <h1>Upload File</h1>
                        <hr class="mb-3">
                        <div class="mb-3">
                            <label for="shared_users" class="form-label">Who would you like to share this file with?</label>
                            <input type="text" class="form-control" id="shared_with" name="shared_with" placeholder="Enter username" required>   
                        </div>
                        <div class="mb-3">
                            <label for="description" class="form-label">Description (Optional)</label>
                            <input type="text" class="form-control" id="description" name="description">
                        </div>
                        <div class="col-md-12 text-end">
                        <div class="mb-3">
                            <input class="form-control" type="file" name="file" id="file" required
                                accept=".txt,.pdf,.doc,.docx,">
                            <small class="form-text text-muted">
                                Allowed formats: documents, text files, pdf files (Max 30MB)
                            </small>
                            <hr class="mb-3">
                            </div>  
                            <button type="submit" class="btn btn-success">
                                <i class="bi bi-shield-lock me-2"></i>Upload File
                            </button>
                        </div>
                            <a href='{{ url_for("main.index") }}'><button type='button' class='btn btn-secondary'>Back</button></a>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
