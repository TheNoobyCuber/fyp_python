<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>File Details</h1>
    <p><strong>Original Filename:</strong> {{ file.original_filename }}</p>
    <p><strong>File Type:</strong> {{ file.filetype }}</p>
    <p><strong>File Size:</strong> {{ file.file_size }} bytes</p>
    <p><strong>Description:</strong> {{ file.description }}</p>
    <p><strong>Status:</strong> {{ file.status }}</p>
    <p><strong>Sensitivity:</strong> {{ file.sensitivity }}</p>
    <p><strong>Action:</strong> {{ file.action }}</p>
</body>
</html>
