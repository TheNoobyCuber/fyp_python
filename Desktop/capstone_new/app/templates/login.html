<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | DLPS</title>
<!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script></head>

<body class="bg-light">
    <div>
        <form method="post" action="{{ url_for('auth.login') }}">
            <div class="container py-5">
                <div class="row">
                    <div class="card shadow-lg">
                        <div class="col-md-8 offset-md-2">
                            <div class="login-header bg-primary text-white text-center mb-2">
                                <div class="display-4">
                                    <h2><i class="fas fa-lock me-2"></i>Welcome Back</h2>
                                    <p class="mb-0 mt-2">Please login to your account</p>
                                </div>
                            </div>
                        <div class="login-body">
                            <form id="loginForm">
                                <div class="input-group mb-3">
                                    <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                                    <input type="text" class="form-control" id="username" name="username" placeholder="Username" required>
                                </div>
                            
                        <div class="input-group mb-3">
                            <span class="input-group-text"><i class="fas fa-key"></i></span>
                            <input type="password" class="form-control" id="password" name="password" placeholder="Password" required>
                            <span class="input-group-text" id="togglePassword" style="cursor: pointer;">
                                <i class="fas fa-eye"></i>
                            </span>
                        </div>
                        <hr class="mb-3">
                        <div class="form-group">
                            <div class="custom-control custom-checkbox">
                                <input type="checkbox" class="custom-control-input" id="rememberMe">
                                <label class="custom-control-label" for="rememberMe">Remember Me</label>
                            </div>
                        </div>
                        <input class="btn btn-primary" type="submit" name="login" value="Login">
                        <a href='index.html'><button type='button' class='btn btn-secondary'>Back</button></a>
                    </div>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
