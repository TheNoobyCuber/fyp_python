<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | DLPS</title>
<!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script></head>
<body>
    <div class="card shadow">
        <div class="card-header bg-info text-white">
            <h3 class="mb-0"><i class="bi bi-person-circle me-2"></i>User Profile </h3>
        </div>
        <div class="card-body">
            <div class="row">
                <div class="col-md-8">
                    <dl class="row">
                        <dt class="col-sm-3">Username</dt>
                        <dd class="col-sm-9">{{ username }}</dd>

                        <dt class="col-sm-3">Member Since</dt>
                        <dd class="col-sm-9">(To be edited)</dd>

                        <dt class="col-sm-3">Total Files</dt>
                        <dd class="col-sm-9">//{{ files|length }}</dd>
                    </dl>
                </div>
                <div class="col-md-4 text-end">
                    <a href="{{ url_for('main.index') }}" class="btn btn-warning">
                        <i class="bi bi-gear me-2"></i>Account Settings
                    </a>
                </div>
            </div>
        </div>
    </div>
    <br>
    <div class="card-body">
        <div class="card-header bg-danger text-white">
            <h3 class="mb-0"><i class="bi bi-folder2-open me-2"></i>Welcome Back! What do you want to do today?</h3>
        </div>
        <hr>
        <div class="col-md-3">
            <a href="{{ url_for('main.view_files') }}" class="btn btn-outline-success admin-action-btn h-75
            w-100">
                <h4><i class="bi bi-folder-fill me-2"></i>View Files</h4>
            </a>
        </div>
        <br>
        <div class="col-md-3">
            <a href="{{ url_for('main.upload') }}" class="btn btn-outline-warning admin-action-btn w-100">
                <h4><i class="bi bi-clipboard-data me-2"></i>Upload a File</h4>
            </a>
        </div>
        <br>
        <div class="col-md-3">
            <button class="btn btn-outline-info admin-action-btn w-100" data-bs-toggle="modal" data-bs-target="#systemSettingsModal">
                <h4><i class="bi bi-gear-fill me-2"></i>Change my Account Settings</h4>
            </button>
        </div>
    </div>
    <br>
    <div class="card shadow">
        <div class="card-header bg-warning text-white">
            <h3 class="mb-0"><i class="bi bi-clipboard-data me-2"></i>Your recent activity</h3>
        </div>
        <div class="card-body">
                <div class="row">
                    <div class="col-md-8">
                        <dl class="row">
                            <dd class="col-sm-9">(Logging activity To be added)</dd>
                        </dl>
                </div>
            </div>
    </div>
    </div>

    <br>
    <div class="text-left mb-4">
            <a href="index.html" class="btn btn-primary">
                <i class="bi bi-box-arrow-left me-2"></i>Logout
        </a>
        </div>
    </div>
</body>
</html>
