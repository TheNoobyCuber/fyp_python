<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <title>Register</title>
</head>
<body>
    </div>

    <div>
    <form method="post">
        <div class="container py-5">
            <div class="row">
                <div class="col-md-6 offset-md-3">
                    <div class="card shadow-lg">
                        <div class="card-body">
                            <h1>Registration</h1>
                            <p>Please fill up the form with the correct information.</p>
                            <hr class="mb-3">
                            <div class="mb-3">
                                <label for="firstname" class="form-label">First Name</label>
                                <input type="text" class="form-control" id="firstname" name="firstname" required>   
                            </div>
                            <div class="mb-3">
                                <label for="lastname" class="form-label">Last Name</label>
                                <input type="text" class="form-control" id="lastname" name="lastname" required>
                            </div>
                            <div class="mb-3">
                                <label for="email" class="form-label">Email address</label>
                                <input type="email" class="form-control" id="email" name="email" required>
                                <button type="button" class="btn btn-outline-primary" id="send-otp-btn" 
                                    onclick="sendOTP()">Send OTP</button>
                            </div>
                            <div class="mb-3" id="otp-section" style="display: none;">
                                <label for="otp" class="form-label">Verification Code</label>
                                <input type="text" class="form-control" id="otp" name="otp" 
                                    placeholder="Enter 6-digit code">
                                <small class="form-text text-muted">Enter the verification code sent to your email</small>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">Password</label>
                                <input type="password" class="form-control" id="password" name="password" required>
                            </div>
                            <div class="mb-3">
                                <label for="confirm_password" class="form-label">Confirm Password</label>
                                <input type="password" class="form-control" id="confirm_password" name="confirm_password" required>
                            </div>
                            <div class="mb-3">
                                <label for="position" class="form-label">Position (Regular Employee, Manager, Admin)</label>
                                <input type="text" class="form-control" id="position" name="position" required>
                            </div>
                            <hr class="mb-3">
                            <input class="btn btn-primary" type="submit" name="create" value="Sign Up">
                            <a href='index.html'><button type='button' class='btn btn-secondary'>Back</button></a>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
